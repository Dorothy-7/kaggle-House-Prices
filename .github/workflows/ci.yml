name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint/test deps (モデル学習系は省略しユニットテストのみ)
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff numpy pandas scipy scikit-learn

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        run: pytest -q
